services:
  web:
    image: harunari/warikan:latest
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "127.0.0.1:${WEB_PORT:-3120}:3100"
      - "100.121.247.20:${WEB_PORT:-3120}:3100"
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/warikan.db
      - PORT=3100
      - TZ=Asia/Tokyo
      - NODE_ENV=production
    labels:
      - "com.centurylinklabs.watchtower.scope=warikan"
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Asia/Tokyo
      - DOCKER_API_VERSION=1.45
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_SCOPE=warikan
    labels:
      - "com.centurylinklabs.watchtower.scope=warikan"
    restart: unless-stopped
